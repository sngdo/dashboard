<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>KRXlens</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#0B0F1A; --card:#1A2235; --border:#242E45;
    --accent:#4AE3B5; --accent2:#6C8EFF;
    --text:#E8EDF5; --text2:#8A97B0; --text3:#4A5568;
    --up:#FF4444; --down:#4488FF; --warn:#FFB547;
    --font:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif;
  }
  body { background:var(--bg); color:var(--text); font-family:var(--font); max-width:430px; margin:0 auto; min-height:100vh; }
  .topbar { position:sticky; top:0; z-index:100; background:rgba(11,15,26,0.95); backdrop-filter:blur(12px); padding:14px 20px 0; border-bottom:1px solid var(--border); }
  .topbar-row { display:flex; align-items:center; justify-content:space-between; padding-bottom:10px; }
  .logo { font-size:18px; font-weight:800; color:var(--accent); }
  .logo span { color:var(--text); }
  .refresh-btn { display:flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--border); color:var(--text2); font-size:11px; font-weight:700; padding:6px 12px; border-radius:20px; cursor:pointer; }
  .refresh-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .refresh-icon.spin { animation:spin 1s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .nav { display:flex; gap:4px; padding-bottom:10px; overflow-x:auto; scrollbar-width:none; }
  .nav::-webkit-scrollbar { display:none; }
  .nav-btn { flex-shrink:0; background:transparent; border:1px solid var(--border); color:var(--text2); font-size:12px; font-weight:600; padding:6px 14px; border-radius:20px; cursor:pointer; transition:all 0.2s; }
  .nav-btn.active { background:var(--accent); border-color:var(--accent); color:#0B0F1A; }
  .page { display:none; padding:16px 20px 100px; }
  .page.active { display:block; }
  .sec-title { font-size:11px; font-weight:700; color:var(--text2); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:10px; margin-top:18px; }
  .sec-title:first-child { margin-top:4px; }
  .status-bar { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px; margin-bottom:12px; font-size:11px; }
  .status-bar.ok   { background:rgba(255,68,68,0.1);   border:1px solid rgba(255,68,68,0.2);   color:var(--up); }
  .status-bar.err  { background:rgba(68,136,255,0.1);  border:1px solid rgba(68,136,255,0.2);  color:var(--down); }
  .status-bar.wait { background:rgba(108,142,255,0.1); border:1px solid rgba(108,142,255,0.2); color:var(--accent2); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:currentColor; flex-shrink:0; }
  .progress-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; display:none; }
  .progress-wrap.show { display:block; }
  .progress-label { font-size:12px; color:var(--text2); margin-bottom:8px; }
  .progress-track { background:var(--border); border-radius:4px; height:6px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:4px; transition:width 0.4s; }
  .progress-log { margin-top:10px; font-size:10px; color:var(--text3); max-height:80px; overflow-y:auto; }
  .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .sum-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px; }
  .sum-label { font-size:11px; color:var(--text2); margin-bottom:6px; }
  .sum-value { font-size:17px; font-weight:800; letter-spacing:-0.5px; }
  .sum-sub { font-size:11px; color:var(--text3); margin-top:3px; }
  .sector-tabs { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; margin-bottom:12px; }
  .sector-tabs::-webkit-scrollbar { display:none; }
  .stab { flex-shrink:0; font-size:11px; font-weight:600; color:var(--text2); background:var(--card); border:1px solid var(--border); padding:4px 12px; border-radius:20px; cursor:pointer; }
  .stab.active { background:var(--accent2); border-color:var(--accent2); color:#fff; }
  .holding-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:12px 14px; margin-bottom:8px; transition:border-color 0.2s; }
  .holding-card.credit-card { border-left:2px solid var(--warn); }
  .holding-card.target-reached { border:2px solid var(--up) !important; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,0.4)} 50%{box-shadow:0 0 0 8px rgba(255,68,68,0)} }
  .holding-row { display:flex; justify-content:space-between; align-items:flex-start; }
  .holding-name { font-size:14px; font-weight:700; }
  .holding-sub { font-size:10px; color:var(--text2); margin-top:3px; }
  .holding-price { font-size:15px; font-weight:800; text-align:right; }
  .holding-chg { font-size:11px; font-weight:600; text-align:right; margin-top:2px; }
  .holding-bar-bg { background:var(--border); border-radius:4px; height:3px; margin-top:10px; }
  .holding-bar { height:100%; border-radius:4px; }
  .holding-footer { display:flex; justify-content:space-between; margin-top:6px; }
  .holding-footer span { font-size:10px; color:var(--text2); }
  .up { color:var(--up); } .down { color:var(--down); }
  .credit-badge { display:inline-block; font-size:9px; font-weight:700; background:rgba(255,181,71,0.15); color:var(--warn); padding:1px 6px; border-radius:4px; margin-left:4px; vertical-align:middle; }
  .target-badge { display:inline-block; font-size:9px; font-weight:700; background:rgba(255,68,68,0.15); color:var(--up); padding:1px 6px; border-radius:4px; margin-left:4px; vertical-align:middle; }
  .target-row { display:flex; align-items:center; gap:6px; margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .target-label { font-size:10px; color:var(--text2); white-space:nowrap; }
  .target-input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:11px; padding:4px 8px; border-radius:6px; outline:none; text-align:right; }
  .target-input:focus { border-color:var(--accent); }
  .target-input.reached { border-color:var(--up); background:rgba(255,68,68,0.08); }
  .target-save-btn { background:var(--accent2); color:#fff; border:none; font-size:10px; font-weight:700; padding:4px 10px; border-radius:6px; cursor:pointer; white-space:nowrap; }
  .target-progress { margin-top:6px; }
  .target-progress-track { background:var(--border); border-radius:4px; height:4px; overflow:hidden; }
  .target-progress-fill { height:100%; border-radius:4px; transition:width 0.4s; }
  .target-progress-label { display:flex; justify-content:space-between; margin-top:3px; }
  .target-progress-label span { font-size:9px; color:var(--text3); }

  /* 종목 관리 */
  .manage-add-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
  .manage-add-title { font-size:13px; font-weight:700; color:var(--accent); margin-bottom:12px; }
  .manage-input-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .manage-input-full { grid-column:1/-1; }
  .manage-label { font-size:10px; color:var(--text2); margin-bottom:4px; font-weight:600; }
  .manage-input { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px; padding:8px 10px; border-radius:8px; outline:none; }
  .manage-input:focus { border-color:var(--accent); }
  .manage-select { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:12px; padding:8px 10px; border-radius:8px; outline:none; }
  .manage-add-btn { width:100%; background:var(--accent); color:#0B0F1A; border:none; font-size:13px; font-weight:700; padding:10px; border-radius:10px; cursor:pointer; margin-top:4px; }
  .manage-list-item { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
  .manage-item-info { flex:1; }
  .manage-item-name { font-size:13px; font-weight:700; }
  .manage-item-sub { font-size:10px; color:var(--text2); margin-top:2px; }
  .manage-credit-toggle { display:flex; align-items:center; gap:6px; margin-top:6px; }
  .manage-credit-toggle label { font-size:11px; color:var(--text2); }
  .manage-delete-btn { background:rgba(255,68,68,0.15); color:var(--up); border:none; font-size:11px; font-weight:700; padding:6px 12px; border-radius:8px; cursor:pointer; white-space:nowrap; }

  /* 알림 팝업 */
  .alert-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:999; align-items:center; justify-content:center; }
  .alert-overlay.show { display:flex; }
  .alert-box { background:var(--card); border:2px solid var(--up); border-radius:20px; padding:24px; margin:20px; text-align:center; animation:alertPop 0.3s ease; max-width:320px; width:100%; }
  @keyframes alertPop { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
  .alert-icon { font-size:48px; margin-bottom:12px; }
  .alert-title { font-size:18px; font-weight:800; color:var(--up); margin-bottom:8px; }
  .alert-body { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:20px; }
  .alert-close { background:var(--up); color:#fff; border:none; font-size:14px; font-weight:700; padding:12px 32px; border-radius:12px; cursor:pointer; width:100%; }

  .val-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:12px; }
  .val-head { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .val-company { font-size:15px; font-weight:800; }
  .val-metrics { display:grid; grid-template-columns:1fr 1fr 1fr; }
  .val-metric { padding:10px 12px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
  .val-metric:nth-child(3n) { border-right:none; }
  .val-metric:nth-last-child(-n+3) { border-bottom:none; }
  .val-metric-label { font-size:9px; color:var(--text3); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .val-metric-value { font-size:13px; font-weight:700; }
  .val-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px; }
  .val-badge.good { background:rgba(255,68,68,0.15); color:var(--up); }
  .val-badge.warn { background:rgba(255,181,71,0.15); color:var(--warn); }
  .val-badge.bad  { background:rgba(68,136,255,0.15); color:var(--down); }
  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(19,25,41,0.97); backdrop-filter:blur(12px); border-top:1px solid var(--border); display:flex; padding:10px 0 20px; }
  .bnav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; color:var(--text3); transition:color 0.2s; }
  .bnav-btn.active { color:var(--accent); }
  .bnav-icon { font-size:20px; }
  .bnav-label { font-size:9px; font-weight:700; }
  .spinner { width:24px; height:24px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 8px; }
  .loading { text-align:center; padding:24px; color:var(--text2); font-size:12px; }
  .empty { text-align:center; padding:30px; color:var(--text3); font-size:13px; }
  .ai-header { background:linear-gradient(135deg,rgba(74,227,181,0.1),rgba(108,142,255,0.1)); border:1px solid rgba(74,227,181,0.2); border-radius:14px; padding:14px 16px; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
  .ai-icon { font-size:22px; }
  .ai-header-text { flex:1; }
  .ai-header-title { font-size:13px; font-weight:700; color:var(--accent); }
  .ai-header-sub { font-size:11px; color:var(--text2); margin-top:2px; }
  .ai-btn { background:var(--accent); color:#0B0F1A; border:none; font-size:12px; font-weight:700; padding:8px 14px; border-radius:10px; cursor:pointer; white-space:nowrap; }
  .ai-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .news-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; margin-bottom:10px; }
  .news-tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:6px; margin-bottom:8px; }
  .news-tag.semi  { background:rgba(108,142,255,0.2); color:var(--accent2); }
  .news-tag.fin   { background:rgba(74,227,181,0.2);  color:var(--accent); }
  .news-tag.macro { background:rgba(255,181,71,0.2);  color:var(--warn); }
  .news-tag.robot { background:rgba(255,92,122,0.2);  color:var(--down); }
  .news-title { font-size:14px; font-weight:700; line-height:1.4; margin-bottom:6px; }
  .news-summary { font-size:12px; color:var(--text2); line-height:1.6; }
  .news-impact { display:flex; align-items:center; gap:6px; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
  .impact-dot { width:8px; height:8px; border-radius:50%; }
</style>
</head>
<body>

<!-- 목표가 도달 알림 -->
<div class="alert-overlay" id="alertOverlay">
  <div class="alert-box">
    <div class="alert-icon">🎯</div>
    <div class="alert-title">목표가 도달!</div>
    <div class="alert-body" id="alertBody"></div>
    <button class="alert-close" onclick="closeAlert()">확인</button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-row">
    <div class="logo">KRX<span>lens</span></div>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAllPrices()">
      <span class="refresh-icon" id="refreshIcon">↻</span>
      <span id="refreshLabel">주가 업데이트</span>
    </button>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('portfolio')">💼 포트폴리오</button>
    <button class="nav-btn" onclick="switchTab('manage')">⚙️ 종목관리</button>
    <button class="nav-btn" onclick="switchTab('valuation')">📊 밸류에이션</button>
  </div>
</div>

<!-- 포트폴리오 -->
<div class="page active" id="page-portfolio">
  <div class="sec-title">내 자산 현황</div>
  <div id="statusBar" class="status-bar wait">
    <div class="status-dot"></div>
    <span>"주가 업데이트" 버튼을 눌러 실시간 주가를 가져오세요</span>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">주가 조회 중...</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-log" id="progressLog"></div>
  </div>
  <div class="summary-grid" id="summaryGrid"></div>
  <div class="sec-title" style="margin-top:16px">보유 종목</div>
  <div class="sector-tabs" id="sectorTabs"></div>
  <div id="holdingsList"></div>
</div>

<!-- 종목 관리 -->
<div class="page" id="page-manage">
  <div class="sec-title">종목 추가</div>
  <div class="manage-add-card">
    <div class="manage-input-grid">
      <div>
        <div class="manage-label">종목명</div>
        <input class="manage-input" id="add-name" placeholder="예: 삼성전자">
      </div>
      <div>
        <div class="manage-label">종목코드</div>
        <input class="manage-input" id="add-code" placeholder="예: 005930" maxlength="6">
      </div>
      <div>
        <div class="manage-label">평균단가 (원)</div>
        <input class="manage-input" id="add-avg" type="number" placeholder="예: 68500">
      </div>
      <div>
        <div class="manage-label">보유수량 (주)</div>
        <input class="manage-input" id="add-qty" type="number" placeholder="예: 100">
      </div>
      <div>
        <div class="manage-label">섹터</div>
        <select class="manage-select" id="add-sector">
          <option value="반도체">반도체</option>
          <option value="반도체장비">반도체장비</option>
          <option value="로봇">로봇</option>
          <option value="자동차">자동차</option>
          <option value="전기전자">전기전자</option>
          <option value="PCB">PCB</option>
          <option value="금융">금융</option>
          <option value="ETF">ETF</option>
          <option value="바이오">바이오</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div style="display:flex;align-items:flex-end;">
        <div style="width:100%">
          <div class="manage-label">신용 여부</div>
          <select class="manage-select" id="add-credit">
            <option value="false">일반</option>
            <option value="true">신용</option>
          </select>
        </div>
      </div>
    </div>
    <button class="manage-add-btn" onclick="addHolding()">+ 종목 추가</button>
  </div>

  <div class="sec-title">보유 종목 관리</div>
  <div id="manageList"></div>
</div>

<!-- 밸류에이션 -->
<div class="page" id="page-valuation">
  <div class="sec-title">재무 분석 (주요 종목)</div>
  <div id="valuationList"></div>
</div>

<div class="bottom-nav">
  <button class="bnav-btn active" onclick="switchTab('portfolio')">
    <span class="bnav-icon">💼</span><span class="bnav-label">포트폴리오</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('manage')">
    <span class="bnav-icon">⚙️</span><span class="bnav-label">종목관리</span>
  </button>
  <button class="bnav-btn" onclick="switchTab('valuation')">
    <span class="bnav-icon">📊</span><span class="bnav-label">밸류에이션</span>
  </button>
</div>

<script>
const WORKER_URL = 'https://kis-proxy.sngdo77.workers.dev';

// ── 기본 종목 데이터 ──
const DEFAULT_HOLDINGS = [
  { name:'제주반도체',     code:'080220', avg:106171, qty:3166,  credit:false, sector:'반도체' },
  { name:'아바텍',         code:'149950', avg:18063,  qty:15709, credit:false, sector:'반도체장비' },
  { name:'두산로보틱스',   code:'454910', avg:119000, qty:2230,  credit:false, sector:'로봇' },
  { name:'주성엔지니어링', code:'036930', avg:192288, qty:446,   credit:false, sector:'반도체장비' },
  { name:'현대차',         code:'005380', avg:740644, qty:410,   credit:true,  sector:'자동차' },
  { name:'산일전기',       code:'062040', avg:273360, qty:567,   credit:true,  sector:'전기전자' },
  { name:'LG이노텍',       code:'011070', avg:1091000,qty:100,   credit:true,  sector:'전기전자' },
  { name:'이수페타시스',   code:'007660', avg:145100, qty:916,   credit:true,  sector:'PCB' },
  { name:'삼영',           code:'000370', avg:8079,   qty:12359, credit:true,  sector:'전기전자' },
  { name:'디아이',         code:'003160', avg:28692,  qty:3400,  credit:true,  sector:'반도체장비' },
  { name:'파워넷',         code:'037030', avg:6196,   qty:20000, credit:true,  sector:'전기전자' },
  { name:'씨엠티엑스',     code:'388210', avg:130834, qty:2300,  credit:false, sector:'반도체' },
  { name:'미래에셋증권',   code:'006800', avg:70000,  qty:1459,  credit:true,  sector:'금융' },
  { name:'KODEX증권',      code:'102970', avg:30000,  qty:3148,  credit:true,  sector:'금융' },
];

const sectorColor = {
  '반도체':'#6C8EFF','반도체장비':'#4AE3B5','로봇':'#FF5C7A',
  'PCB':'#FFB547','자동차':'#26C887','전기전자':'#A78BFA',
  '금융':'#F472B6','ETF':'#94A3B8','바이오':'#F59E0B','기타':'#8A97B0'
};

// ── 종목 저장/불러오기 ──
function getHoldings() {
  try {
    const saved = localStorage.getItem('krx_holdings');
    return saved ? JSON.parse(saved) : DEFAULT_HOLDINGS;
  } catch { return DEFAULT_HOLDINGS; }
}
function saveHoldings(list) {
  localStorage.setItem('krx_holdings', JSON.stringify(list));
}

// ── 목표가 ──
function getTargets() {
  try { return JSON.parse(localStorage.getItem('krx_targets') || '{}'); } catch { return {}; }
}
function saveTarget(code, val) {
  const t = getTargets();
  if (val) t[code] = parseInt(val.toString().replace(/,/g, ''));
  else delete t[code];
  localStorage.setItem('krx_targets', JSON.stringify(t));
}

let prices = {};
let currentSector = '전체';
let alertedCodes = new Set();

// ── 목표가 알림 ──
function checkTargets() {
  const targets = getTargets();
  const holdings = getHoldings();
  const reached = [];
  holdings.forEach(h => {
    const target = targets[h.code];
    const price = prices[h.code]?.price;
    if (target && price && price >= target && !alertedCodes.has(h.code)) {
      reached.push({ name: h.name, price, target });
      alertedCodes.add(h.code);
    }
  });
  if (reached.length > 0) showAlert(reached);
}
function showAlert(list) {
  const body = list.map(r =>
    `<strong style="color:var(--text)">${r.name}</strong><br>현재가 ${r.price.toLocaleString()}원 → 목표가 ${r.target.toLocaleString()}원 도달! 🎉`
  ).join('<br><br>');
  document.getElementById('alertBody').innerHTML = body;
  document.getElementById('alertOverlay').classList.add('show');
  if (navigator.vibrate) navigator.vibrate([300, 100, 300, 100, 300]);
}
function closeAlert() {
  document.getElementById('alertOverlay').classList.remove('show');
}

// ── 주가 조회 ──
async function fetchAllPrices() {
  const holdings = getHoldings();
  const btn  = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  const wrap = document.getElementById('progressWrap');
  const fill = document.getElementById('progressFill');
  const log  = document.getElementById('progressLog');

  btn.disabled = true;
  icon.classList.add('spin');
  document.getElementById('refreshLabel').textContent = '조회 중...';
  wrap.classList.add('show');
  log.innerHTML = '';
  fill.style.width = '10%';
  setStatus('wait', 'Worker에서 전체 주가를 가져오는 중...');
  document.getElementById('progressLabel').textContent = '전체 종목 조회 중...';

  try {
    const codes = holdings.map(h => h.code).join(',');
    const res = await fetch(`${WORKER_URL}?codes=${codes}`);
    const data = await res.json();
    fill.style.width = '100%';
    log.innerHTML = '';
    let ok = 0;
    holdings.forEach(h => {
      const r = data[h.code];
      if (r && r.price && r.price > 0) {
        prices[h.code] = r;
        ok++;
        addLog(`✅ ${h.name}: ${r.price.toLocaleString()}원 (${r.change>=0?'+':''}${r.change}%)`);
      } else {
        addLog(`⚠️ ${h.name}: ${r?.error || '조회 실패'}`);
      }
    });
    const now = new Date();
    const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    setStatus(ok > 0 ? 'ok' : 'err',
      ok > 0 ? `${ok}/${holdings.length}개 종목 업데이트 완료 · ${t} 기준` : '주가 조회 실패');
    checkTargets();
  } catch(e) {
    setStatus('err', '오류: ' + e.message);
    addLog('❌ ' + e.message);
  }

  btn.disabled = false;
  icon.classList.remove('spin');
  document.getElementById('refreshLabel').textContent = '새로고침';
  wrap.classList.remove('show');
  renderSummary();
  renderHoldings(currentSector);
}

function addLog(msg) {
  const log = document.getElementById('progressLog');
  const div = document.createElement('div');
  div.textContent = msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
function setStatus(type, msg) {
  const el = document.getElementById('statusBar');
  el.className = 'status-bar ' + type;
  el.innerHTML = `<div class="status-dot"></div><span>${msg}</span>`;
}

function getPrice(h)  { return prices[h.code]?.price || h.avg; }
function hasPrice(h)  { return !!prices[h.code] && prices[h.code].price > 0; }
function calc(h) {
  const price = getPrice(h);
  const val = price * h.qty, cost = h.avg * h.qty;
  return { ...h, price, val, cost, pnl: val-cost, pct: (price-h.avg)/h.avg*100 };
}

// ── 요약 ──
function renderSummary() {
  const holdings = getHoldings();
  const c = holdings.map(calc);
  const normal = c.filter(h=>!h.credit);
  const credit = c.filter(h=>h.credit);
  const normalPnl = normal.reduce((s,h)=>s+h.pnl, 0);
  const normalVal = normal.reduce((s,h)=>s+h.val, 0);
  const creditPnl = credit.reduce((s,h)=>s+h.pnl, 0);
  const totalPnl = normalPnl + creditPnl;
  const totalCost = c.reduce((s,h)=>s+h.cost, 0);
  const totalPct = totalPnl / totalCost * 100;
  const displayVal = normalVal + creditPnl;
  const win = c.filter(h=>h.pnl>=0).length;
  document.getElementById('summaryGrid').innerHTML = `
    <div class="sum-card"><div class="sum-label">총 평가금액</div>
      <div class="sum-value" style="font-size:15px">${fmt(displayVal)}원</div>
      <div class="sum-sub">일반 ${fmt(normalVal)}원 + 신용손익</div></div>
    <div class="sum-card"><div class="sum-label">총 손익</div>
      <div class="sum-value ${totalPnl>=0?'up':'down'}" style="font-size:15px">${totalPnl>=0?'+':''}${fmt(totalPnl)}원</div>
      <div class="sum-sub ${totalPnl>=0?'up':'down'}">${totalPct>=0?'+':''}${totalPct.toFixed(2)}%</div></div>
    <div class="sum-card"><div class="sum-label">수익/손실</div>
      <div class="sum-value" style="color:var(--up)">${win}종목 수익</div>
      <div class="sum-sub" style="color:var(--down)">${c.length-win}종목 손실</div></div>
    <div class="sum-card"><div class="sum-label">신용 손익</div>
      <div class="sum-value ${creditPnl>=0?'up':'down'}" style="font-size:14px">${creditPnl>=0?'+':''}${fmt(creditPnl)}원</div>
      <div class="sum-sub">${credit.length}개 종목</div></div>`;
}

// ── 보유 종목 ──
function renderHoldings(sector='전체') {
  currentSector = sector;
  const holdings = getHoldings();
  const c = holdings.map(calc);
  const tv = c.reduce((s,h)=>s+h.val,0);
  const filtered = sector==='전체' ? c : c.filter(h=>h.sector===sector);
  const sectors = ['전체',...new Set(c.map(h=>h.sector))];
  const targets = getTargets();

  document.getElementById('sectorTabs').innerHTML = sectors.map(s=>
    `<button class="stab ${s===sector?'active':''}" onclick="renderHoldings('${s}')">${s}</button>`).join('');

  document.getElementById('holdingsList').innerHTML = [...filtered].sort((a,b)=>b.val-a.val).map(h => {
    const w=h.val/tv*100, col=sectorColor[h.sector]||'#8A97B0';
    const chg=prices[h.code]?.change;
    const dayStr=chg!=null?`<span style="margin-left:6px;color:${chg>=0?'var(--up)':'var(--down)'}">당일 ${chg>=0?'+':''}${chg}%</span>`:'';
    const target = targets[h.code];
    const reached = target && h.price >= target;
    const targetPct = target && hasPrice(h) ? Math.min((h.price / target) * 100, 100) : 0;
    const remainPct = target ? ((target - h.price) / h.price * 100).toFixed(1) : null;

    return `<div class="holding-card ${h.credit?'credit-card':''} ${reached?'target-reached':''}">
      <div class="holding-row">
        <div>
          <div class="holding-name">${h.name}
            ${h.credit?'<span class="credit-badge">신용</span>':''}
            ${reached?'<span class="target-badge">🎯 목표달성</span>':''}
          </div>
          <div class="holding-sub">${h.code} · ${h.sector} · ${h.qty.toLocaleString()}주</div>
        </div>
        <div>
          <div class="holding-price">${hasPrice(h)?h.price.toLocaleString()+'원':'<span style="color:var(--text3)">'+h.avg.toLocaleString()+'원(매입가)</span>'}</div>
          <div class="holding-chg ${h.pct>=0?'up':'down'}">${hasPrice(h)?(h.pct>=0?'▲':'▼')+Math.abs(h.pct).toFixed(1)+'%':'─'}${dayStr}</div>
        </div>
      </div>
      <div class="holding-bar-bg">
        <div class="holding-bar" style="width:${Math.min(w*3,100)}%;background:${col}"></div>
      </div>
      <div class="holding-footer">
        <span>평가 ${fmt(h.val)}원 (비중 ${w.toFixed(1)}%)</span>
        <span class="${h.pnl>=0?'up':'down'}">${h.pnl>=0?'+':''}${fmt(h.pnl)}원</span>
      </div>
      <div class="target-row">
        <span class="target-label">🎯 목표가</span>
        <input class="target-input ${reached?'reached':''}" id="target_${h.code}"
          type="number" placeholder="목표가 입력" value="${target||''}"
          onkeydown="if(event.key==='Enter')saveTargetAndRender('${h.code}')">
        <button class="target-save-btn" onclick="saveTargetAndRender('${h.code}')">저장</button>
      </div>
      ${target && hasPrice(h) ? `
      <div class="target-progress">
        <div class="target-progress-track">
          <div class="target-progress-fill" style="width:${targetPct}%;background:${reached?'var(--up)':'var(--accent2)'}"></div>
        </div>
        <div class="target-progress-label">
          <span>현재 ${h.price.toLocaleString()}원</span>
          <span>${reached?'✅ 달성!':remainPct>0?'목표까지 +'+remainPct+'%':'─'}</span>
          <span>목표 ${target.toLocaleString()}원</span>
        </div>
      </div>` : ''}
    </div>`;
  }).join('');
}

function saveTargetAndRender(code) {
  const input = document.getElementById(`target_${code}`);
  saveTarget(code, input.value);
  alertedCodes.delete(code);
  renderHoldings(currentSector);
  checkTargets();
}

// ── 종목 관리 ──
function addHolding() {
  const name   = document.getElementById('add-name').value.trim();
  const code   = document.getElementById('add-code').value.trim();
  const avg    = parseInt(document.getElementById('add-avg').value);
  const qty    = parseInt(document.getElementById('add-qty').value);
  const sector = document.getElementById('add-sector').value;
  const credit = document.getElementById('add-credit').value === 'true';

  if (!name || !code || !avg || !qty) {
    alert('종목명, 종목코드, 평균단가, 수량을 모두 입력해주세요!');
    return;
  }
  if (code.length !== 6 || isNaN(parseInt(code))) {
    alert('종목코드는 6자리 숫자로 입력해주세요!');
    return;
  }

  const holdings = getHoldings();
  if (holdings.find(h => h.code === code)) {
    alert('이미 추가된 종목코드예요!');
    return;
  }

  holdings.push({ name, code, avg, qty, credit, sector });
  saveHoldings(holdings);

  // 입력창 초기화
  document.getElementById('add-name').value = '';
  document.getElementById('add-code').value = '';
  document.getElementById('add-avg').value = '';
  document.getElementById('add-qty').value = '';

  renderManageList();
  renderSummary();
  renderHoldings(currentSector);
  alert(`${name} 추가됐어요!`);
}

function deleteHolding(code) {
  const holdings = getHoldings();
  const h = holdings.find(x => x.code === code);
  if (!confirm(`${h?.name}을 삭제할까요?`)) return;
  saveHoldings(holdings.filter(x => x.code !== code));
  renderManageList();
  renderSummary();
  renderHoldings(currentSector);
}

function toggleCredit(code) {
  const holdings = getHoldings();
  const h = holdings.find(x => x.code === code);
  if (h) h.credit = !h.credit;
  saveHoldings(holdings);
  renderManageList();
  renderSummary();
  renderHoldings(currentSector);
}

function renderManageList() {
  const holdings = getHoldings();
  document.getElementById('manageList').innerHTML = holdings.map(h => {
    const p = prices[h.code];
    const price = p?.price || h.avg;
    const pct = ((price - h.avg) / h.avg * 100);
    return `<div class="manage-list-item">
      <div class="manage-item-info">
        <div class="manage-item-name">${h.name} <span style="color:var(--text3);font-size:10px">${h.code}</span></div>
        <div class="manage-item-sub">
          평균 ${h.avg.toLocaleString()}원 · ${h.qty.toLocaleString()}주 · ${h.sector}
          ${p ? `· 현재 <span class="${pct>=0?'up':'down'}">${pct>=0?'+':''}${pct.toFixed(1)}%</span>` : ''}
        </div>
        <div class="manage-credit-toggle">
          <input type="checkbox" id="credit_${h.code}" ${h.credit?'checked':''} onchange="toggleCredit('${h.code}')">
          <label for="credit_${h.code}">신용 종목</label>
        </div>
      </div>
      <button class="manage-delete-btn" onclick="deleteHolding('${h.code}')">삭제</button>
    </div>`;
  }).join('');
}

// ── 밸류에이션 ──
const valuationData = [
  { name:'제주반도체',     code:'080220', per:18.2, pbr:1.2,  roe:7.1,  debt:28,  cap:'3,115억' },
  { name:'아바텍',         code:'149950', per:12.4, pbr:1.8,  roe:14.8, debt:22,  cap:'3,379억' },
  { name:'두산로보틱스',   code:'454910', per:88.4, pbr:5.2,  roe:5.8,  debt:31,  cap:'4조2천억' },
  { name:'주성엔지니어링', code:'036930', per:14.1, pbr:2.1,  roe:15.2, debt:18,  cap:'1조6천억' },
  { name:'이수페타시스',   code:'007660', per:16.8, pbr:3.4,  roe:21.4, debt:44,  cap:'1조3천억' },
  { name:'LG이노텍',       code:'011070', per:9.2,  pbr:0.82, roe:9.1,  debt:62,  cap:'4조1천억' },
  { name:'현대차',         code:'005380', per:5.8,  pbr:0.51, roe:9.4,  debt:185, cap:'50조' },
];

function renderValuation() {
  const holdings = getHoldings();
  document.getElementById('valuationList').innerHTML = valuationData.map(v => {
    const h=holdings.find(x=>x.code===v.code);
    const price=prices[v.code]?.price||null;
    const pct=h&&price?(price-h.avg)/h.avg*100:null;
    return `<div class="val-card">
      <div class="val-head">
        <div><div class="val-company">${v.name}</div>
          <div style="font-size:10px;color:var(--text2)">${v.code} · 시총 ${v.cap}</div></div>
        <div style="text-align:right">
          <div style="font-size:15px;font-weight:800">${price?price.toLocaleString()+'원':'─'}</div>
          ${pct!==null?`<div style="font-size:11px" class="${pct>=0?'up':'down'}">${pct>=0?'+':''}${pct.toFixed(1)}%</div>`:''}
        </div>
      </div>
      <div class="val-metrics">
        <div class="val-metric"><div class="val-metric-label">PER</div><div class="val-metric-value"><span class="val-badge ${v.per<10?'good':v.per<20?'warn':'bad'}">${v.per}x</span></div></div>
        <div class="val-metric"><div class="val-metric-label">PBR</div><div class="val-metric-value"><span class="val-badge ${v.pbr<1?'good':v.pbr<2?'warn':'bad'}">${v.pbr}x</span></div></div>
        <div class="val-metric"><div class="val-metric-label">ROE</div><div class="val-metric-value"><span class="val-badge ${v.roe>=15?'good':v.roe>=8?'warn':'bad'}">${v.roe}%</span></div></div>
        <div class="val-metric"><div class="val-metric-label">부채비율</div><div class="val-metric-value"><span class="val-badge ${v.debt<50?'good':v.debt<100?'warn':'bad'}">${v.debt}%</span></div></div>
        <div class="val-metric"><div class="val-metric-label">평균단가</div><div class="val-metric-value" style="font-size:11px">${h?.avg.toLocaleString()||'─'}원</div></div>
        <div class="val-metric"><div class="val-metric-label">손익률</div><div class="val-metric-value ${pct!==null?(pct>=0?'up':'down'):''}">${pct!==null?(pct>=0?'+':'')+pct.toFixed(1)+'%':'─'}</div></div>
      </div></div>`;
  }).join('');
}

// ── 탭 전환 ──
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  const tabs=['portfolio','manage','valuation'];
  document.querySelectorAll('.nav-btn')[tabs.indexOf(tab)]?.classList.add('active');
  document.querySelectorAll('.bnav-btn')[tabs.indexOf(tab)]?.classList.add('active');
  if(tab==='valuation') renderValuation();
  if(tab==='manage') renderManageList();
}

function fmt(n) {
  const a=Math.abs(n);
  if(a>=1e8) return (n/1e8).toFixed(1)+'억';
  if(a>=1e4) return Math.round(n/1e4)+'만';
  return n.toLocaleString();
}

// ── 초기화 ──
renderSummary();
renderHoldings();
</script>
